<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @media (prefers-color-scheme: light) {
      .background { fill: black; }
      .foreground { fill: white; }
    }
    @media (prefers-color-scheme: dark) {
      .background { fill: white; }
      .foreground { fill: black; }
    }
  </style>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="180" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#020617" />
      <stop offset="1" stop-color="#00f2ff" />
    </linearGradient>
  </defs>
  <rect class="background" width="180" height="180" rx="37" fill="url(#bg)" />
  <g style="transform: translate(20px,20px)">
    <!-- grid -->
    <rect x="0" y="0" width="140" height="140" rx="18" fill="none" stroke="white" stroke-opacity="0.18" stroke-width="2" />
    <path d="M35 10v120M70 10v120M105 10v120M10 35h120M10 70h120M10 105h120" stroke="white" stroke-opacity="0.12" stroke-width="2" />
    <!-- entrance cell -->
    <rect x="10" y="105" width="25" height="25" rx="6" fill="#00f2ff" fill-opacity="0.16" stroke="#00f2ff" stroke-width="2" />
    <text x="22.5" y="123" text-anchor="middle" dominant-baseline="middle" font-size="16" class="foreground">
      🚪
    </text>
    <!-- asset cell -->
    <rect x="70" y="35" width="25" height="25" rx="6" fill="white" fill-opacity="0.12" stroke="white" stroke-opacity="0.5" stroke-width="2" />
    <text x="82.5" y="47" text-anchor="middle" dominant-baseline="middle" font-size="14" class="foreground">
      💻
    </text>
  </g>
</svg>